<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ER Explorer</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f0f0f3;
      color: #1d1d1f;
      overflow: hidden;
    }

    nav {
      font-size: 0.82rem;
      padding: 0.45rem 1rem;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
      z-index: 20;
    }
    nav a { color: #0066cc; text-decoration: none; }
    nav a:hover { text-decoration: underline; }

    #app { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: 270px;
      min-width: 270px;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      transition: width 0.2s, min-width 0.2s;
      overflow: hidden;
      z-index: 10;
    }
    #sidebar.collapsed { width: 0; min-width: 0; }

    #sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #ebebeb;
      flex-shrink: 0;
    }
    #sidebar-title { font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }

    #collapse-btn {
      background: none; border: none; cursor: pointer;
      color: #aaa; font-size: 0.9rem; padding: 2px 4px; line-height: 1;
      flex-shrink: 0;
    }
    #collapse-btn:hover { color: #333; }

    #sidebar-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0.65rem;
      gap: 0.6rem;
      overflow: hidden;
      min-width: 270px;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #erd-input {
      flex: 1;
      font-family: "SF Mono", Menlo, monospace;
      font-size: 0.76rem;
      line-height: 1.55;
      border: 1px solid #d8d8d8;
      border-radius: 6px;
      padding: 0.55rem;
      resize: none;
      outline: none;
      color: #1d1d1f;
      background: #fafafa;
      min-height: 80px;
    }
    #erd-input:focus { border-color: #0066cc; background: #fff; }

    .btn-row { display: flex; gap: 0.35rem; }

    .btn {
      padding: 0.3rem 0.65rem;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 0.78rem;
      cursor: pointer;
      background: #f5f5f7;
      color: #1d1d1f;
      white-space: nowrap;
    }
    .btn:hover { background: #e8e8ea; }
    .btn.primary { background: #0066cc; color: #fff; border-color: #0066cc; }
    .btn.primary:hover { background: #005ab5; }
    .btn.active { background: #0066cc; color: #fff; border-color: #0066cc; }

    .file-btn { position: relative; overflow: hidden; }
    .file-btn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 0; }

    #search-input {
      width: 100%;
      padding: 0.35rem 0.6rem;
      border: 1px solid #d8d8d8;
      border-radius: 6px;
      font-size: 0.82rem;
      outline: none;
    }
    #search-input:focus { border-color: #0066cc; }
    #search-clear { display: none; margin-top: 0.25rem; font-size: 0.72rem; color: #0066cc; cursor: pointer; }
    #search-clear:hover { text-decoration: underline; }

    #stats { font-size: 0.72rem; color: #aaa; }

    /* ── Canvas area ── */
    #canvas-area { flex: 1; position: relative; overflow: hidden; }

    #expand-btn {
      display: none;
      position: absolute;
      top: 0.6rem; left: 0.6rem;
      z-index: 10;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 0.28rem 0.55rem;
      font-size: 0.78rem;
      cursor: pointer;
      color: #555;
    }
    #expand-btn:hover { background: #f5f5f7; }

    svg#canvas { width: 100%; height: 100%; display: block; }

    /* ── Nodes ── */
    .node { cursor: pointer; }
    .node rect.bg { fill: #fff; stroke: #c8c8cc; stroke-width: 1.5; }
    .node rect.header-fill { fill: #eaeff8; }
    .node line.div { stroke: #e0e0e0; stroke-width: 1; }
    .node text.ename { font-size: 12.5px; font-weight: 700; fill: #1a2848; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
    .node text.ftype { font-size: 10.5px; fill: #888; font-family: "SF Mono", Menlo, monospace; dominant-baseline: central; pointer-events: none; }
    .node text.fname { font-size: 10.5px; fill: #333; dominant-baseline: central; pointer-events: none; }
    .node text.fcon { font-size: 9.5px; fill: #aaa; font-style: italic; dominant-baseline: central; text-anchor: end; pointer-events: none; }

    /* ── Links ── */
    .link line.edge { stroke: #bbb; stroke-width: 1.5; fill: none; }
    .link line.edge.dashed { stroke-dasharray: 5 3; }
    .link text.lbl { font-size: 9.5px; fill: #aaa; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
    .link .card line { stroke: #bbb; stroke-width: 1.5; }
    .link .card circle { fill: #f0f0f3; stroke: #bbb; stroke-width: 1.5; }

    /* ── Highlight states ── */
    .node.selected rect.bg { stroke: #0066cc; stroke-width: 2.5; }
    .node.selected rect.header-fill { fill: #ccdff8; }
    .node.selected text.ename { fill: #004499; }
    .node.neighbour rect.bg { stroke: #80b8f0; stroke-width: 2; }
    .node.neighbour rect.header-fill { fill: #deeeff; }
    .node.dimmed { opacity: 0.15; pointer-events: none; }
    .link.active line.edge { stroke: #0066cc; stroke-width: 2; }
    .link.active .card line { stroke: #0066cc; }
    .link.active .card circle { stroke: #0066cc; }
    .link.dimmed { opacity: 0.08; pointer-events: none; }

    /* ── Search states ── */
    .node.smatch rect.bg { stroke: #d08000; stroke-width: 2.5; }
    .node.smatch rect.header-fill { fill: #fff2cc; }
    .node.sfmatch rect.bg { stroke: #d08000; stroke-width: 1.5; stroke-dasharray: 4 2; }
    .node.snone { opacity: 0.15; pointer-events: none; }
    .node text.fname.fhit { fill: #8a5200; font-weight: 700; }

    /* ── Hint ── */
    #hint {
      position: absolute;
      bottom: 0.8rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.52);
      color: #fff;
      font-size: 0.7rem;
      padding: 0.28rem 0.75rem;
      border-radius: 999px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    #hint.on { opacity: 1; }
  </style>
</head>
<body>
<nav><a href="/tools/">← Tools</a></nav>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <span id="sidebar-title">ER Explorer</span>
      <button id="collapse-btn" title="Hide panel">◀</button>
    </div>
    <div id="sidebar-body">

      <div style="display:flex;flex-direction:column;gap:0.3rem;flex:1;overflow:hidden">
        <span class="section-label">Diagram</span>
        <textarea id="erd-input" spellcheck="false"></textarea>
        <div class="btn-row">
          <button class="btn file-btn">
            Load file
            <input type="file" id="file-input" accept=".mmd,.txt,.md">
          </button>
          <button class="btn primary" id="render-btn">Render</button>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:0.3rem">
        <span class="section-label">Layout</span>
        <div class="btn-row">
          <button class="btn active" id="btn-force">Force</button>
          <button class="btn" id="btn-dagre">Hierarchical</button>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:0.3rem">
        <span class="section-label">Search</span>
        <input type="text" id="search-input" placeholder="Entity or field name…">
        <span id="search-clear">Clear search</span>
      </div>

      <span id="stats"></span>
    </div>
  </div>

  <div id="canvas-area">
    <button id="expand-btn">▶ Edit</button>
    <svg id="canvas"></svg>
    <div id="hint"></div>
  </div>
</div>

<script>
(() => {
  // ─── Constants ───────────────────────────────────────────────────────
  const NW = 200;          // node width
  const NH = 34;           // header height
  const FH = 22;           // field row height
  const FX = 10;           // field left padding
  const TYPE_W = 54;       // type column width
  const BOTTOM_PAD = 8;    // bottom padding below last field

  // ─── State ────────────────────────────────────────────────────────────
  let simulation = null;
  let linkSel = null;
  let nodeSel = null;
  let currentNodes = [];
  let currentLinks = [];
  let selectedEntity = null;
  let currentLayout = 'force';  // 'force' | 'dagre'
  let svgSelection = null;
  let rootG = null;

  // ─── Utilities ───────────────────────────────────────────────────────
  const safeId = s => 'n' + s.replace(/[^a-zA-Z0-9]/g, '_');

  function nodeH(entity) {
    return NH + entity.fields.length * FH + BOTTOM_PAD;
  }

  // Intersection of line (cx,cy)→(tx,ty) with rect border centred at (cx,cy)
  function borderPt(cx, cy, tx, ty, w, h) {
    const dx = tx - cx, dy = ty - cy;
    if (Math.abs(dx) < 1e-6 && Math.abs(dy) < 1e-6) return { x: cx, y: cy };
    const sx = Math.abs(dx) > 1e-6 ? (w / 2) / Math.abs(dx) : Infinity;
    const sy = Math.abs(dy) > 1e-6 ? (h / 2) / Math.abs(dy) : Infinity;
    const t  = Math.min(sx, sy);
    return { x: cx + dx * t, y: cy + dy * t };
  }

  // ─── Parser ───────────────────────────────────────────────────────────
  function parseERD(text) {
    const entities = {};
    const rels = [];
    let cur = null;

    for (const raw of text.split('\n')) {
      const line = raw.trim();
      if (!line || line === 'erDiagram' || line.startsWith('%%')) continue;

      const eOpen = line.match(/^([A-Za-z_][\w-]*)\s*\{$/);
      if (eOpen) { cur = eOpen[1]; if (!entities[cur]) entities[cur] = { fields: [] }; continue; }
      if (line === '}') { cur = null; continue; }

      if (cur) {
        const fm = line.match(/^(\S+)\s+(\S+)(?:\s+(.+))?$/);
        if (fm) entities[cur].fields.push({ type: fm[1], name: fm[2], con: fm[3]?.trim().replace(/"/g, '') || null });
        continue;
      }

      const rm = line.match(/^([A-Za-z_][\w-]*)\s+([|o}{]+[-.]+[|o}{]+)\s+([A-Za-z_][\w-]*)\s*:\s*"?([^"]*)"?$/);
      if (rm) {
        const [, from, rel, to, label] = rm;
        if (!entities[from]) entities[from] = { fields: [] };
        if (!entities[to]) entities[to] = { fields: [] };
        const m = rel.match(/^([|o}{]+)[-.]+([|o}{]+)$/);
        rels.push({
          from, to, label: label.trim(),
          leftCard:  m ? normCard(m[1]) : null,
          rightCard: m ? normCard(m[2]) : null,
          dashed: rel.includes('..'),
        });
      }
    }
    return { entities, rels };
  }

  function normCard(s) {
    if (s === '||')                return 'one_only';
    if (s === '|o' || s === 'o|') return 'zero_or_one';
    if (s === 'o{' || s === '}o') return 'zero_or_many';
    if (s === '|{' || s === '}|') return 'one_or_many';
    if (s === '}{' || s === '{}') return 'many';
    if (s === '|')                 return 'one';
    if (s === 'o')                 return 'zero';
    return null;
  }

  // ─── Cardinality markers ──────────────────────────────────────────────
  function drawCard(parent, x, y, tx, ty, card) {
    if (!card) return;
    const dx = tx - x, dy = ty - y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < 1) return;
    const ux = dx/d, uy = dy/d;
    const px = -uy, py = ux;
    const T=8, D1=9, D2=18, CF=7;

    const g = parent.append('g').attr('class', 'card');
    const tick = dist => g.append('line')
      .attr('x1', x+ux*dist - px*T).attr('y1', y+uy*dist - py*T)
      .attr('x2', x+ux*dist + px*T).attr('y2', y+uy*dist + py*T);
    const dot = dist => g.append('circle').attr('cx', x+ux*dist).attr('cy', y+uy*dist).attr('r', 4);
    const fork = dist => {
      const bx = x+ux*dist, by = y+uy*dist;
      g.append('line').attr('x1',x).attr('y1',y).attr('x2', bx+px*CF).attr('y2', by+py*CF);
      g.append('line').attr('x1',x).attr('y1',y).attr('x2', bx-px*CF).attr('y2', by-py*CF);
      g.append('line').attr('x1',x).attr('y1',y).attr('x2', bx       ).attr('y2', by       );
    };

    if      (card === 'one_only')     { tick(D1); tick(D2); }
    else if (card === 'one')          { tick(D1); }
    else if (card === 'zero_or_one')  { dot(D1); tick(D2); }
    else if (card === 'zero')         { dot(D1); }
    else if (card === 'many')         { fork(D2); }
    else if (card === 'one_or_many')  { tick(D2); fork(D1); }
    else if (card === 'zero_or_many') { dot(D2); fork(D1); }
  }

  // ─── Render / update positions ────────────────────────────────────────
  function updatePositions(transition) {
    const upd = (sel) => transition ? sel.transition().duration(500) : sel;

    upd(nodeSel).attr('transform', d => `translate(${d.x - NW/2},${d.y - d.height/2})`);

    // Update links (no transition on lines; redraw cardinality after settle)
    linkSel.each(function(d) {
      const sx = typeof d.source === 'object' ? d.source.x : 0;
      const sy = typeof d.source === 'object' ? d.source.y : 0;
      const tx = typeof d.target === 'object' ? d.target.x : 0;
      const ty = typeof d.target === 'object' ? d.target.y : 0;
      const sh = typeof d.source === 'object' ? d.source.height : NW;
      const th = typeof d.target === 'object' ? d.target.height : NW;
      const s = borderPt(sx, sy, tx, ty, NW, sh);
      const t = borderPt(tx, ty, sx, sy, NW, th);
      const g = d3.select(this);
      g.select('line.edge').attr('x1',s.x).attr('y1',s.y).attr('x2',t.x).attr('y2',t.y);
      g.select('text.lbl').attr('x',(s.x+t.x)/2).attr('y',(s.y+t.y)/2 - 7);
      g.selectAll('.card').remove();
      drawCard(g, s.x, s.y, t.x, t.y, d.leftCard);
      drawCard(g, t.x, t.y, s.x, s.y, d.rightCard);
    });
  }

  // ─── Force layout ─────────────────────────────────────────────────────
  function startForce(nodes, links) {
    const svg = document.getElementById('canvas');
    const W = svg.clientWidth, H = svg.clientHeight;

    if (simulation) simulation.stop();

    simulation = d3.forceSimulation(nodes)
      .force('link',    d3.forceLink(links).id(d => d.id).distance(300).strength(0.5))
      .force('charge',  d3.forceManyBody().strength(-900))
      .force('center',  d3.forceCenter(W/2, H/2))
      .force('collide', d3.forceCollide(d => Math.max(NW/2, d.height/2) + 30))
      .on('tick', () => updatePositions(false));
  }

  // ─── Dagre layout ─────────────────────────────────────────────────────
  function applyDagre(nodes, links) {
    const g = new dagre.graphlib.Graph();
    g.setGraph({ rankdir: 'LR', nodesep: 50, ranksep: 100, marginx: 60, marginy: 60 });
    g.setDefaultEdgeLabel(() => ({}));

    nodes.forEach(n => g.setNode(n.id, { width: NW, height: n.height }));
    links.forEach(l => {
      const from = typeof l.source === 'object' ? l.source.id : l.source;
      const to   = typeof l.target === 'object' ? l.target.id : l.target;
      g.setEdge(from, to);
    });

    dagre.layout(g);

    nodes.forEach(n => {
      const pos = g.node(n.id);
      n.x = pos.x;
      n.y = pos.y;
    });
  }

  // ─── Main render ──────────────────────────────────────────────────────
  function render(text) {
    const parsed = parseERD(text);
    const names = Object.keys(parsed.entities);
    if (!names.length) {
      document.getElementById('stats').textContent = 'No entities found.';
      return;
    }

    if (simulation) { simulation.stop(); simulation = null; }

    const svg = d3.select('#canvas');
    svg.selectAll('*').remove();

    const W = svg.node().clientWidth, H = svg.node().clientHeight;

    // Build data
    const nodes = names.map(name => ({
      id: name,
      entity: parsed.entities[name],
      height: nodeH(parsed.entities[name]),
      x: W/2 + (Math.random()-0.5)*200,
      y: H/2 + (Math.random()-0.5)*200,
    }));
    const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));
    const links = parsed.rels.map(r => ({ ...r, source: r.from, target: r.to }));

    currentNodes = nodes;
    currentLinks = links;
    selectedEntity = null;

    // ── SVG defs ──
    const defs = svg.append('defs');
    const f = defs.append('filter').attr('id','shadow').attr('x','-15%').attr('y','-15%').attr('width','130%').attr('height','130%');
    f.append('feDropShadow').attr('dx',0).attr('dy',2).attr('stdDeviation',3).attr('flood-color','rgba(0,0,0,0.10)');

    // Clip paths for entity headers
    nodes.forEach(n => {
      defs.append('clipPath').attr('id', safeId(n.id)+'-hclip')
        .append('rect').attr('width', NW).attr('height', NH);
    });

    // ── Structure ──
    const root = svg.append('g').attr('id','root');
    rootG = root;
    const lg = root.append('g').attr('id','links');
    const ng = root.append('g').attr('id','nodes');

    // ── Zoom ──
    const zoom = d3.zoom().scaleExtent([0.06,5]).on('zoom', e => root.attr('transform', e.transform));
    svg.call(zoom).on('dblclick.zoom', null);
    svg.on('click', e => { if (!e.target.closest('.node')) clearHighlight(); });

    // ── Links ──
    linkSel = lg.selectAll('.link')
      .data(links)
      .join('g').attr('class','link');
    linkSel.append('line').attr('class', d => 'edge' + (d.dashed ? ' dashed' : ''));
    linkSel.append('text').attr('class','lbl');

    // ── Nodes ──
    nodeSel = ng.selectAll('.node')
      .data(nodes, d => d.id)
      .join('g').attr('class','node').attr('data-id', d => d.id)
      .call(d3.drag()
        .on('start', (e,d) => {
          if (currentLayout === 'force' && simulation) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }
        })
        .on('drag', (e,d) => {
          if (currentLayout === 'force') { d.fx=e.x; d.fy=e.y; }
          else { d.x=e.x; d.y=e.y; updatePositions(false); }
        })
        .on('end', (e,d) => {
          if (currentLayout === 'force' && simulation) { if (!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }
        })
      )
      .on('click', (e,d) => { e.stopPropagation(); selectedEntity===d.id ? clearHighlight() : highlightEntity(d.id); });

    // Background rect (rounded, full height)
    nodeSel.append('rect').attr('class','bg').attr('width',NW).attr('height',d=>d.height).attr('rx',7).attr('ry',7).style('filter','url(#shadow)');

    // Header fill — same rounded rect, clipped to header height
    nodeSel.append('rect').attr('class','header-fill')
      .attr('width',NW).attr('height',d=>d.height)
      .attr('rx',7).attr('ry',7)
      .attr('clip-path', d => `url(#${safeId(d.id)}-hclip)`);

    // Divider line
    nodeSel.filter(d => d.entity.fields.length > 0)
      .append('line').attr('class','div').attr('x1',0).attr('y1',NH).attr('x2',NW).attr('y2',NH);

    // Entity name
    nodeSel.append('text').attr('class','ename').attr('x',NW/2).attr('y',NH/2).text(d=>d.id);

    // Fields
    nodeSel.each(function(d) {
      const g = d3.select(this);
      d.entity.fields.forEach((f,i) => {
        const y = NH + i*FH + FH/2;
        g.append('text').attr('class','ftype').attr('x',FX).attr('y',y).text(f.type);
        g.append('text').attr('class','fname').attr('x',FX+TYPE_W).attr('y',y).attr('data-fname',f.name).text(f.name);
        if (f.con) g.append('text').attr('class','fcon').attr('x',NW-FX).attr('y',y).text(f.con);
      });
    });

    document.getElementById('stats').textContent =
      `${names.length} entities · ${links.length} relationships`;
    document.getElementById('search-input').value = '';
    clearSearch();
    clearHighlight();

    // ── Run layout ──
    if (currentLayout === 'force') {
      startForce(nodes, links);
    } else {
      applyDagre(nodes, links);
      updatePositions(false);
    }
  }

  // ─── Switch layout ────────────────────────────────────────────────────
  function switchLayout(to) {
    if (!currentNodes.length) { currentLayout = to; return; }
    currentLayout = to;

    if (to === 'force') {
      startForce(currentNodes, currentLinks);
    } else {
      if (simulation) { simulation.stop(); simulation = null; }
      applyDagre(currentNodes, currentLinks);
      updatePositions(true);
    }
  }

  // ─── Highlight ────────────────────────────────────────────────────────
  function highlightEntity(name) {
    selectedEntity = name;
    const nbrs = new Set();
    const activeLinkIdx = new Set();

    currentLinks.forEach((l, i) => {
      const from = typeof l.source === 'object' ? l.source.id : l.source;
      const to   = typeof l.target === 'object' ? l.target.id : l.target;
      if (from === name || to === name) {
        activeLinkIdx.add(i);
        nbrs.add(from === name ? to : from);
      }
    });

    nodeSel
      .classed('selected',  d => d.id === name)
      .classed('neighbour', d => d.id !== name && nbrs.has(d.id))
      .classed('dimmed',    d => d.id !== name && !nbrs.has(d.id));

    linkSel
      .classed('active', (_,i) => activeLinkIdx.has(i))
      .classed('dimmed',  (_,i) => !activeLinkIdx.has(i));

    hint('Click entity again or background to clear');
  }

  function clearHighlight() {
    selectedEntity = null;
    if (nodeSel) nodeSel.classed('selected neighbour dimmed', false);
    if (linkSel) linkSel.classed('active dimmed', false);
    clearHint();
  }

  // ─── Search ───────────────────────────────────────────────────────────
  function applySearch(q) {
    q = q.trim().toLowerCase();
    if (!q) { clearSearch(); return; }
    document.getElementById('search-clear').style.display = 'block';

    nodeSel.each(function(d) {
      const nameHit = d.id.toLowerCase().includes(q);
      const fieldHits = d.entity.fields.filter(f =>
        f.name.toLowerCase().includes(q) || f.type.toLowerCase().includes(q)
      );
      const anyHit = nameHit || fieldHits.length > 0;

      d3.select(this)
        .classed('smatch',  nameHit && !fieldHits.length)
        .classed('sfmatch', !nameHit && fieldHits.length > 0)
        .classed('smatch',  nameHit)
        .classed('snone',   !anyHit);

      d3.select(this).selectAll('text.fname').each(function() {
        const el = d3.select(this);
        const fn = el.attr('data-fname') || '';
        el.classed('fhit', fn.toLowerCase().includes(q));
      });
    });
  }

  function clearSearch() {
    document.getElementById('search-clear').style.display = 'none';
    if (!nodeSel) return;
    nodeSel.classed('smatch sfmatch snone', false);
    nodeSel.selectAll('text.fname').classed('fhit', false);
  }

  // ─── Hint ─────────────────────────────────────────────────────────────
  let hintTimer;
  function hint(msg) {
    const el = document.getElementById('hint');
    el.textContent = msg; el.classList.add('on');
    clearTimeout(hintTimer); hintTimer = setTimeout(clearHint, 3500);
  }
  function clearHint() { document.getElementById('hint').classList.remove('on'); }

  // ─── UI wiring ────────────────────────────────────────────────────────
  const textarea    = document.getElementById('erd-input');
  const fileInput   = document.getElementById('file-input');
  const renderBtn   = document.getElementById('render-btn');
  const searchInput = document.getElementById('search-input');
  const searchClear = document.getElementById('search-clear');
  const collapseBtn = document.getElementById('collapse-btn');
  const expandBtn   = document.getElementById('expand-btn');
  const sidebar     = document.getElementById('sidebar');
  const btnForce    = document.getElementById('btn-force');
  const btnDagre    = document.getElementById('btn-dagre');

  renderBtn.addEventListener('click', () => render(textarea.value));
  textarea.addEventListener('keydown', e => { if ((e.metaKey||e.ctrlKey) && e.key==='Enter') render(textarea.value); });

  fileInput.addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => { textarea.value = ev.target.result; render(textarea.value); };
    r.readAsText(f);
    e.target.value = '';
  });

  searchInput.addEventListener('input', e => applySearch(e.target.value));
  searchClear.addEventListener('click', () => { searchInput.value=''; clearSearch(); });

  collapseBtn.addEventListener('click', () => { sidebar.classList.add('collapsed'); expandBtn.style.display='block'; });
  expandBtn.addEventListener('click',   () => { sidebar.classList.remove('collapsed'); expandBtn.style.display='none'; });

  btnForce.addEventListener('click', () => {
    currentLayout='force'; btnForce.classList.add('active'); btnDagre.classList.remove('active');
    switchLayout('force');
  });
  btnDagre.addEventListener('click', () => {
    currentLayout='dagre'; btnDagre.classList.add('active'); btnForce.classList.remove('active');
    switchLayout('dagre');
  });

  // ─── Default example ──────────────────────────────────────────────────
  textarea.value = `erDiagram
    CUSTOMER ||--o{ ORDER : places
    ORDER ||--|{ ORDER_ITEM : contains
    PRODUCT ||--o{ ORDER_ITEM : "included in"
    CATEGORY ||--o{ PRODUCT : contains
    CUSTOMER {
        int    id        PK
        string name
        string email
        string phone
    }
    ORDER {
        int    id          PK
        int    customer_id FK
        date   placed_at
        string status
    }
    ORDER_ITEM {
        int   id         PK
        int   order_id   FK
        int   product_id FK
        int   quantity
        float unit_price
    }
    PRODUCT {
        int    id          PK
        int    category_id FK
        string name
        float  price
        int    stock
    }
    CATEGORY {
        int    id          PK
        string name
        string description
    }`;

  window.addEventListener('load', () => render(textarea.value));
})();
</script>
</body>
</html>
